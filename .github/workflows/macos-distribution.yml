name: macOS Distribution

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload artifacts to, for example v0.1.0"
        required: true
        type: string
      runner:
        description: "macOS runner label. Use an Apple Silicon runner for arm64 artifacts."
        required: true
        default: "macos-latest"
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Sign, notarize, and upload macOS package
    runs-on: ${{ inputs.runner }}

    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      NOTARY_PROFILE: reading-ruler-notary

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_P12_BASE64}" || -z "${APPLE_CERTIFICATE_PASSWORD}" || -z "${KEYCHAIN_PASSWORD}" ]]; then
            echo "Missing certificate secrets. Configure APPLE_CERTIFICATE_P12_BASE64, APPLE_CERTIFICATE_PASSWORD, and KEYCHAIN_PASSWORD." >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/reading-ruler-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID}" || -z "${APPLE_TEAM_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" ]]; then
            echo "Missing notarization secrets. Configure APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD." >&2
            exit 1
          fi

          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Check distribution prerequisites
        run: npm run app:package:mac:distribution -- --check-prereqs

      - name: Build signed and notarized macOS artifacts
        run: npm run app:package:mac:distribution -- --notarize "$NOTARY_PROFILE"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reading-ruler-macos-distribution
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip
            src-tauri/target/release/bundle/*.sha256

      - name: Upload files to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.tag }}" \
            src-tauri/target/release/bundle/dmg/*.dmg \
            src-tauri/target/release/bundle/macos/*.app.zip \
            src-tauri/target/release/bundle/*.sha256 \
            --repo "${{ github.repository }}" \
            --clobber
